name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate without publishing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/app-ci.yml

  publish:
    needs: ci
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Validate version tag
        if: github.event_name == 'release'
        working-directory: ./subtrack
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          # Must be valid semver
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid semver: $TAG_VERSION"
            exit 1
          fi

          # Package version must match tag (or be incremented from it)
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "⚠  Package version ($PKG_VERSION) differs from tag ($TAG_VERSION) — will overwrite"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $TAG_VERSION"
        id: version

      - name: Verify signed tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          SIGNATURE=$(git tag -v "$TAG" 2>&1 || true)
          if echo "$SIGNATURE" | grep -q "error:"; then
            echo "❌ Tag $TAG is not signed or cannot be verified."
            echo "   Release tags must be signed with: git tag -s <tag>"
            echo "   See https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-tags"
            exit 1
          elif echo "$SIGNATURE" | grep -q "Good signature"; then
            echo "✅ Tag $TAG has a valid signature"
          else
            echo "⚠  Tag verification ambiguous:"
            echo "$SIGNATURE" | head -5
            exit 1
          fi

      - name: Set package.json version from tag
        if: github.event_name == 'release'
        working-directory: ./subtrack
        run: |
          node -e "
            const fs = require('fs')
            const pkg = require('./package.json')
            pkg.version = '${{ steps.version.outputs.version }}'
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')
          "

      - run: pnpm install --frozen-lockfile

      # Generate npm-shrinkwrap.json for reproducible installs
      - name: Generate shrinkwrap
        working-directory: ./subtrack
        run: npm shrinkwrap

      - run: pnpm build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          artifact-name: subtrack-sbom-${{ steps.version.outputs.version || 'dev' }}
          format: spdx-json

      - name: Verify build
        working-directory: ./subtrack
        run: |
          test -f dist/index.mjs
          test -f npm-shrinkwrap.json
          node -e "
            const bytes = require('fs').readFileSync('dist/index.mjs').length;
            const tag = '${{ steps.version.outputs.version }}';
            console.log('📦 subtrack v' + tag + ' | dist/index.mjs (' + (bytes / 1024).toFixed(1) + ' KB)');
          "

      - name: Attest build provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: subtrack/dist/index.mjs,subtrack/npm-shrinkwrap.json

      - name: Dry run publish
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == true)
        working-directory: ./subtrack
        run: pnpm publish --no-git-checks --provenance --dry-run

      - name: Publish to npm
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false)
        working-directory: ./subtrack
        run: pnpm publish --no-git-checks --provenance

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ./subtrack
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Attach SBOM and build provenance
          gh release upload "$TAG" \
            dist/index.mjs#subtrack.mjs \
            npm-shrinkwrap.json#npm-shrinkwrap.json
          echo "✅ Uploaded assets to $TAG"
