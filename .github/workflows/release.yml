name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate without publishing"
        type: boolean
        default: true

jobs:
  check:
    uses: ./.github/workflows/check.yml

  publish:
    needs: check
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Validate version tag
        working-directory: ./subtrack
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          # Must be valid semver
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid semver: $TAG_VERSION"
            exit 1
          fi

          # Package version must match tag (or be incremented from it)
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "⚠  Package version ($PKG_VERSION) differs from tag ($TAG_VERSION) — will overwrite"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $TAG_VERSION"
        id: version

      - name: Set package.json version from tag
        working-directory: ./subtrack
        run: |
          node -e "
            const fs = require('fs')
            const pkg = require('./package.json')
            pkg.version = '${{ steps.version.outputs.version }}'
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n')
          "

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify build
        working-directory: ./subtrack
        run: |
          test -f dist/index.mjs
          node -e "
            const bytes = require('fs').readFileSync('dist/index.mjs').length;
            const tag = '${{ steps.version.outputs.version }}';
            console.log('📦 subtrack v' + tag + ' | dist/index.mjs (' + (bytes / 1024).toFixed(1) + ' KB)');
          "

      - name: Dry run publish
        working-directory: ./subtrack
        run: pnpm publish --no-git-checks --provenance --dry-run

      - name: Publish to npm
        working-directory: ./subtrack
        run: pnpm publish --no-git-checks --provenance

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ./subtrack
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" dist/index.mjs#subtrack.mjs
          echo "✅ Uploaded subtrack.mjs to $TAG"
