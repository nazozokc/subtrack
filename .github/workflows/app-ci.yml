name: app-ci

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/check.yml"
      - ".github/workflows/app-ci.yml"
      - "pnpm-workspace.yaml"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/check.yml"
      - ".github/workflows/app-ci.yml"
      - "pnpm-workspace.yaml"
      - "package.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/check.yml

  compatibility:
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22, 23, 24]
        include:
          - os: macos-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile --verify-store-integrity

      - run: pnpm build

      - run: pnpm test

      - name: Verify CLI runs (built binary)
        if: runner.os != 'Windows'
        working-directory: ./subtrack
        run: node dist/index.mjs --help

      - name: Spell check
        if: runner.os == 'Linux' && matrix.node-version == 22
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          files: subtrack/
          config: typos.toml

      - name: Audit dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level=high
