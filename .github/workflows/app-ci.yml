name: app-ci

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/check.yml"
      - ".github/workflows/app-ci.yml"
      - "pnpm-workspace.yaml"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/check.yml"
      - ".github/workflows/app-ci.yml"
      - "pnpm-workspace.yaml"
      - "package.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/check.yml

  compatibility:
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22, 23, 24]
        include:
          - os: macos-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Verify CLI runs (built binary)
        if: runner.os != 'Windows'
        working-directory: ./subtrack
        run: node dist/index.mjs --help

      - name: Spell check
        if: runner.os == 'Linux' && matrix.node-version == 22
        uses: crate-ci/typos@v1.47.2
        with:
          files: subtrack/
          config: typos.toml

      - name: Audit dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level=high
