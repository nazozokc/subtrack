name: app-ci

on:
  push:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/**"
      - ".agents/**"
      - ".claude/**"
      - "opencode.jsonc"
      - "pnpm-workspace.yaml"
      - "package.json"
  pull_request:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/**"
      - ".agents/**"
      - ".claude/**"
      - "opencode.jsonc"
      - "pnpm-workspace.yaml"
      - "package.json"

jobs:
  test:
    strategy:
      matrix:
        node-version: [22, 23, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Verify CLI starts (built binary)
        working-directory: ./subtrack
        run: node dist/index.mjs --help

      - name: Verify CLI list command (dev mode)
        working-directory: ./subtrack
        run: pnpm start list

      - name: Verify CLI export csv command
        working-directory: ./subtrack
        run: pnpm start export csv

      - name: Verify CLI export md command
        working-directory: ./subtrack
        run: pnpm start export md

      - name: Spell check with typos
        if: runner.os == 'Linux'
        uses: crate-ci/typos@v1.47.2
        with:
          files: subtrack/
          config: typos.toml

      - name: Audit dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level=high
