name: renovate-approve

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })

            // Only approve PRs where Renovate has enabled auto-merge.
            // Major updates and dashboard-approval PRs are excluded
            // because Renovate does not enable auto-merge on them.
            if (!pr.data.auto_merge) {
              console.log('Auto-merge not enabled — skipping auto-approval')
              return
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: 'Auto-approved: Renovate PR with auto-merge enabled.'
            })
