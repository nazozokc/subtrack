name: CI

on:
  push:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "subtrack/**"
      - ".github/workflows/**"

jobs:
  test:
    strategy:
      matrix:
        node-version: [22, 23]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('subtrack/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install
        working-directory: ./subtrack

      - run: pnpm build
        working-directory: ./subtrack

      - run: pnpm test
        working-directory: ./subtrack

      - name: Verify CLI starts (built binary)
        run: node dist/index.mjs --help
        working-directory: ./subtrack

      - name: Verify CLI list command (dev mode)
        run: pnpm start list
        working-directory: ./subtrack

      - name: Spell check with typos
        if: runner.os == 'Linux'
        uses: crate-ci/typos@v1.47.2
        with:
          files: subtrack/
          config: typos.toml
