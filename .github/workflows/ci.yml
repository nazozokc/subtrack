name: CI

on:
  push:
    branches: [main]
    paths:
      - "subsc-cli/**"
  pull_request:
    branches: [main]
    paths:
      - "subsc-cli/**"

defaults:
  run:
    working-directory: ./subsc-cli

jobs:
  test:
    strategy:
      matrix:
        node-version: [22, 23]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "subsc-cli/pnpm-lock.yaml"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Verify CLI starts (built binary)
        run: node dist/index.mjs --help

      - name: Verify CLI list command (dev mode)
        run: pnpm start list
