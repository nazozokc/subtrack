# Dependabot configuration for defense-in-depth dependency monitoring.
# Works alongside Renovate — Dependabot catches vulnerabilities faster
# via GitHub Advisory Database integration, while Renovate handles
# scheduled updates with release-age gating.
#
# Dependabot runs security updates (not version bumps) regardless
# of this config when a GHSA is published.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    # Only security updates — regular version bumps are handled by Renovate
    allow:
      - dependency-type: "all"
    reviewers:
      - "nazozokc"
    assignees:
      - "nazozokc"

  - package-ecosystem: "npm"
    directory: "/subtrack"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    allow:
      - dependency-type: "all"
    reviewers:
      - "nazozokc"
    assignees:
      - "nazozokc"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "nazozokc"
    assignees:
      - "nazozokc"
